<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR & Payroll System{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'payroll_app/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">HR & Payroll Portal</div>
        <div class="nav-links">
            {% if request.user.is_authenticated %}
                <span class="user-greeting">Welcome, {{ request.user.username }}</span>
                <!-- Logout Form to prevent CSRF on logout as well -->
                <form method="POST" action="{% url 'logout' %}" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
