{% extends "payroll_app/base.html" %}

{% block title %}Login - HR & Payroll{% endblock %}

{% block content %}
<div class="login-container">
    <div class="glass-card">
        <h2>System Login</h2>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <!-- POST form, needs CSRF -->
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <!-- Client-side validation: pattern allows alphanumeric, max length 50 -->
                <input type="text" id="username" name="username" required pattern="[a-zA-Z0-9_]+" maxlength="50" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required maxlength="128" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary">Secure Login</button>
        </form>
    </div>
</div>
{% endblock %}
